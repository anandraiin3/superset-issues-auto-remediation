version: "3.9"

services:
  remediation:
    build: .
    ports:
      - "${DASHBOARD_PORT:-5000}:5000"
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - DEVIN_API_KEY=${DEVIN_API_KEY}
      - DEVIN_ORG_ID=${DEVIN_ORG_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPOSITORY_URL=${REPOSITORY_URL}
      - APP_BASE_URL=${APP_BASE_URL:-}
      - ISSUE_TYPES=${ISSUE_TYPES:-bug,feature,task}
      - POLLING_INTERVAL_SECONDS=${POLLING_INTERVAL_SECONDS:-30}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-45}
      - DATABASE_PATH=/data/sessions.db
      - DASHBOARD_PORT=5000
    volumes:
      # OB-07 / NF-04: Database persists across container restarts
      - session-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  session-data:
